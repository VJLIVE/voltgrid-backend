services:
  - type: web
    name: voltgrid-backend
    runtime: node
    rootDir: backend
    buildCommand: pnpm install && pnpm build
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # paste from TiDB Cloud / your MySQL provider
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false          # paste your Vercel URL after deploying frontend
      - key: PORT
        value: 3000
